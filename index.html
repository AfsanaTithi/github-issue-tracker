<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 text-slate-800 font-sans min-h-screen">

    <div id="login-page" class="min-h-screen flex items-center justify-center bg-[#f7f8fa] px-4 font-sans">
        <div
            class="bg-white p-8 sm:p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-md text-center border border-gray-100">
            <img src="assets/github-logo.png" alt="Logo" class="w-[72px] h-[72px] mx-auto mb-4"
                onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'">
            <h1 class="text-[22px] font-bold text-gray-800 mb-1.5">GitHub Issues Tracker</h1>
            <p class="text-[#8e95a3] text-sm mb-8 font-medium">Sign in to manage your issues</p>

            <div class="space-y-5 text-left">
                <div>
                    <label class="block text-sm font-bold text-gray-800 mb-2">Username</label>
                    <input type="text" id="username" placeholder="Enter Username"
                        class="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-[#7a00ff] focus:border-[#7a00ff] transition">
                    <p class="text-[11px] text-[#aa00ff] font-bold mt-1.5 tracking-wide">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-800 mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter Password"
                        class="w-full px-4 py-3 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-[#7a00ff] focus:border-[#7a00ff] transition"
                        onkeypress="if(event.key === 'Enter') handleLogin()">
                    <p class="text-[11px] text-[#aa00ff] font-bold mt-1.5 tracking-wide">Default: admin123</p>
                </div>
                <button onclick="handleLogin()"
                    class="w-full bg-[#7a00ff] text-white text-[15px] font-bold py-3.5 rounded-lg hover:bg-[#6b00e6] transition mt-2">Sign
                    In</button>
            </div>

            <div class="relative flex py-7 items-center">
                <div class="flex-grow border-t border-gray-100"></div>
                <span class="flex-shrink-0 mx-4 text-[#8e95a3] text-[13px] font-medium">OR</span>
                <div class="flex-grow border-t border-gray-100"></div>
            </div>

            <div class="text-center">
                <p class="text-[#8e95a3] text-[13px] font-medium mb-3">Demo Credentials:</p>
                <div
                    class="bg-[#f8f9fb] p-5 rounded-xl text-center text-[14px] text-gray-800 border-none inline-block w-full">
                    <p class="mb-1"><span class="font-bold">Username:</span> admin</p>
                    <p><span class="font-bold">Password:</span> admin123</p>
                </div>
            </div>

            <p id="login-error" class="text-red-500 text-sm font-bold mt-5 hidden">Invalid credentials. Please try
                again.</p>
        </div>
    </div>


    <div id="app-page" class="hidden min-h-screen flex flex-col">

        <nav class="bg-white border-b sticky top-0 z-40">
            <div class="px-6 lg:px-12">
                <div class="flex justify-between items-center h-[72px]">
                    <div class="flex items-center">
                        <img src="assets/github-logo.png" alt="Logo" class="h-8 w-8 mr-3"
                            onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'">
                        <span class="font-bold text-[20px] tracking-tight text-gray-800">GitHub Issues Tracker</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="relative hidden sm:block">
                            <i
                                class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="search-input" placeholder="Search issues..."
                                class="w-[300px] pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-[#7a00ff] focus:border-[#7a00ff]"
                                onkeyup="if(event.key === 'Enter') handleSearch()">
                        </div>
                        <button disabled
                            class="bg-[#7a00ff] text-white px-5 py-2.5 rounded-lg text-sm font-bold opacity-50 cursor-not-allowed flex items-center shadow-sm">
                            <i class="fa-solid fa-plus mr-2 text-[12px]"></i> New Issue
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="flex-grow max-w-[1280px] mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">

            <div class="mb-6 bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex items-center">
                <nav class="flex space-x-3">
                    <button onclick="switchTab('all')" id="tab-all"
                        class="bg-[#7a00ff] text-white px-8 py-2.5 rounded border border-[#7a00ff] font-bold text-sm transition">
                        All
                    </button>
                    <button onclick="switchTab('open')" id="tab-open"
                        class="bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 px-8 py-2.5 rounded font-bold text-sm transition">
                        Open
                    </button>
                    <button onclick="switchTab('closed')" id="tab-closed"
                        class="bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 px-8 py-2.5 rounded font-bold text-sm transition">
                        Closed
                    </button>
                </nav>
            </div>

            <div
                class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center gap-4">
                    <div class="bg-[#f0e6ff] p-3 rounded-full flex items-center justify-center shrink-0 w-12 h-12">
                        <img src="assets/Aperture.png" alt="Aperture" class="w-6 h-6 object-contain"
                            onerror="this.style.display='none'">
                        <i class="fa-solid fa-list-ul hidden fallback-icon text-[#7a00ff]"></i>
                    </div>
                    <div>
                        <div class="flex items-baseline gap-2">
                            <span id="issue-count" class="font-bold text-[22px] text-gray-900 leading-tight">50</span>
                            <span class="font-bold text-[22px] text-gray-900 leading-tight">Issues</span>
                        </div>
                        <p class="text-[#8e95a3] text-[14px]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-5 text-[14px] font-bold mt-4 sm:mt-0">
                    <span class="flex items-center gap-2 text-gray-700">
                        <div class="w-2.5 h-2.5 rounded-full bg-[#00d084]"></div> Open
                    </span>
                    <span class="flex items-center gap-2 text-gray-700">
                        <div class="w-2.5 h-2.5 rounded-full bg-[#aa00ff]"></div> Closed
                    </span>
                </div>
            </div>

        </main>
    </div>

    <script src="./js/app.js"></script>
</body>

</html>
